<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luau → Turbowarp Extension Builder</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        header h1 {
            font-weight: 300;
            color: #ffb347;
        }
        header .info {
            font-size: 0.9rem;
            color: #aaa;
        }
        .main {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2d2d44;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .panel h2 {
            font-weight: 300;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #ffb347;
        }
        .editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        textarea, .code-output {
            flex: 1;
            width: 100%;
            background: #1a1a2e;
            color: #e0e0e0;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 2;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .code-output {
            background: #12121f;
            overflow: auto;
            color: #b0d0f0;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #ffb347;
            color: #1e1e2f;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #ffa020;
            transform: scale(1.02);
        }
        button.secondary {
            background: #4a4a6a;
            color: #eee;
        }
        button.secondary:hover {
            background: #5a5a7a;
        }
        .example-btn {
            background: #2d5f7a;
            color: #eee;
        }
        .example-btn:hover {
            background: #3a7a9a;
        }
        .status {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            background: #1a1a2e;
            font-size: 0.9rem;
            color: #8f8;
        }
        .status.error {
            color: #f77;
            background: #3a1a1a;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        @media (max-width: 800px) {
            .main { flex-direction: column; }
            .panel { flex: none; height: 50vh; }
        }
    </style>
</head>
<body>
    <header>
        <h1>⚡ Luau → Turbowarp Extension</h1>
        <span class="info">Пиши на Luau, получай JS для Turbowarp</span>
    </header>
    <div class="main">
        <!-- Левая панель: редактор Luau -->
        <div class="panel">
            <h2>📝 Код на Luau</h2>
            <div class="editor-container">
                <textarea id="luauInput" spellcheck="false" placeholder="Введите код на Luau...">tbw.extension("example", "Пример")

tbw.block("Сложить [a] и [b]", function(args)
    return args.a + args.b
end, {
    a = "number",
    b = "number"
})

tbw.block("Приветствие [name]", function(args)
    print("Привет, " .. args.name)
end, {
    name = "string"
})</textarea>
            </div>
            <div class="toolbar">
                <button id="convertBtn">🔄 Конвертировать в JS</button>
                <button id="downloadBtn" class="secondary">⬇ Скачать .js</button>
                <button id="exampleBtn" class="example-btn">📋 Загрузить пример</button>
            </div>
            <div id="status" class="status">Готов к работе</div>
        </div>

        <!-- Правая панель: вывод JS -->
        <div class="panel">
            <h2>📦 Сгенерированный JavaScript</h2>
            <div class="editor-container">
                <pre id="jsOutput" class="code-output">// Здесь появится код расширения</pre>
            </div>
            <div class="toolbar">
                <button id="copyBtn" class="secondary">📄 Копировать</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const luauInput = document.getElementById('luauInput');
            const jsOutput = document.getElementById('jsOutput');
            const statusDiv = document.getElementById('status');
            const convertBtn = document.getElementById('convertBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const copyBtn = document.getElementById('copyBtn');
            const exampleBtn = document.getElementById('exampleBtn');

            // Пример Luau-кода
            const exampleLuau = `tbw.extension("math", "Математика")

tbw.block("Сложить [a] и [b]", function(args)
    return args.a + args.b
end, {
    a = "number",
    b = "number"
})

tbw.block("Случайное число от [min] до [max]", function(args)
    return math.random(args.min, args.max)
end, {
    min = "number",
    max = "number"
})

tbw.block("Сказать [text]", function(args)
    print("Сообщение: " .. args.text)
end, {
    text = "string"
})`;

            // ----- Транслятор Luau → JS -----
            function translateLuauToJS(luauCode) {
                // Удаляем комментарии (однострочные --)
                let code = luauCode.replace(/--[^\n]*/g, '');

                // Разбиваем на строки для удобства
                let lines = code.split('\n').map(l => l.trim()).filter(l => l.length > 0);

                // Храним данные расширения
                let extId = 'myextension';
                let extName = 'My Extension';
                let blocks = []; // каждый элемент: { text, funcBody, argsDesc, opcode }

                // Состояние парсера
                let i = 0;
                while (i < lines.length) {
                    const line = lines[i];

                    // Обработка tbw.extension("id", "name")
                    const extMatch = line.match(/^tbw\.extension\s*\(\s*"([^"]+)"\s*,\s*"([^"]+)"\s*\)$/);
                    if (extMatch) {
                        extId = extMatch[1];
                        extName = extMatch[2];
                        i++;
                        continue;
                    }

                    // Обработка tbw.block("text", function(args) ... end, { ... })
                    const blockMatch = line.match(/^tbw\.block\s*\(\s*"([^"]+)"\s*,\s*function\s*\(\s*args\s*\)/);
                    if (blockMatch) {
                        const text = blockMatch[1];
                        // Ищем тело функции до "end" и таблицу аргументов после ","
                        // Начинаем собирать строки тела
                        let bodyLines = [];
                        let j = i + 1;
                        let depth = 0;
                        let foundEnd = false;
                        let argsTable = '';

                        // Ищем соответствующий "end" для функции
                        while (j < lines.length) {
                            const l = lines[j];
                            if (l === 'end' && depth === 0) {
                                // Это конец функции
                                foundEnd = true;
                                j++;
                                break;
                            } else if (l.startsWith('function')) {
                                depth++;
                                bodyLines.push(l);
                            } else if (l === 'end') {
                                if (depth > 0) depth--;
                                if (depth === 0) {
                                    // Это конец вложенной функции? но мы уже нашли end для внешней?
                                    // но мы идём до первого end с depth=0, что соответствует внешней функции
                                    // Так что здесь мы не должны выходить, если depth=0, но мы уже вышли выше
                                    // Поэтому логика: если depth===0 и l==='end' - это конец функции
                                    // Но мы уже обработали выше, поэтому здесь просто пропускаем
                                }
                                bodyLines.push(l);
                            } else {
                                bodyLines.push(l);
                            }
                            j++;
                        }

                        if (!foundEnd) {
                            throw new Error('Не найден "end" для блока: ' + text);
                        }

                        // Теперь после "end" должна быть таблица аргументов: { a = "number", b = "number" }
                        // Пропускаем возможные запятые и пробелы
                        while (j < lines.length && !lines[j].startsWith('{')) {
                            j++;
                        }
                        if (j >= lines.length) {
                            throw new Error('Ожидается таблица аргументов после "end" для блока: ' + text);
                        }
                        // Собираем таблицу до закрывающей }
                        let tableLines = [];
                        let braceDepth = 0;
                        let started = false;
                        while (j < lines.length) {
                            const l = lines[j];
                            for (let ch of l) {
                                if (ch === '{') { braceDepth++; started = true; }
                                if (ch === '}') { braceDepth--; }
                            }
                            tableLines.push(l);
                            j++;
                            if (started && braceDepth === 0) break;
                        }
                        argsTable = tableLines.join(' ');

                        // Извлекаем описание аргументов из argsTable
                        // Формат: { a = "number", b = "number" }
                        // Упрощённый парсинг: ищем пары ключ = "тип"
                        let argsDesc = {};
                        const pairs = argsTable.match(/(\w+)\s*=\s*"([^"]+)"/g);
                        if (pairs) {
                            for (let p of pairs) {
                                const m = p.match(/(\w+)\s*=\s*"([^"]+)"/);
                                if (m) {
                                    argsDesc[m[1]] = m[2];
                                }
                            }
                        }

                        // Тело функции (без внешнего function(args) и end)
                        let body = bodyLines.join('\n');
                        // Убираем строки, которые могут быть 'function(args)' или 'end' (но мы уже их исключили)
                        // Но оставляем только тело
                        // Также преобразуем Luau-синтаксис в JS:
                        // - замена function ... end на function ... { ... } уже сделана на этапе генерации
                        // - замена local на var
                        // - замена and, or, not
                        // - замена .. на +
                        // - замена args.имя на args['имя']
                        // - print -> console.log
                        // - math. -> Math.
                        let jsBody = body
                            .replace(/\bprint\s*\(/g, 'console.log(')
                            .replace(/\bmath\./g, 'Math.')
                            .replace(/\band\b/g, '&&')
                            .replace(/\bor\b/g, '||')
                            .replace(/\bnot\b/g, '!')
                            .replace(/\.\./g, '+')
                            .replace(/args\.(\w+)/g, "args['$1']")
                            .replace(/\blocal\b/g, 'var');

                        // Если тело содержит return, то блок репортёр, иначе команда.
                        const hasReturn = /return\s+/.test(jsBody);

                        // Генерируем opcode
                        const opcode = 'block' + (blocks.length + 1);

                        blocks.push({
                            text: text,
                            argsDesc: argsDesc,
                            body: jsBody,
                            opcode: opcode,
                            hasReturn: hasReturn
                        });

                        i = j; // продолжить с позиции после таблицы
                        continue;
                    }

                    // Если строка не распознана, пропускаем (возможно, комментарий или пустая)
                    i++;
                }

                // ----- Генерация JavaScript -----
                let jsCode = `(function(Scratch) {\n  'use strict';\n\n`;
                const className = extId.charAt(0).toUpperCase() + extId.slice(1) + 'Extension';
                jsCode += `  class ${className} {\n`;
                jsCode += `    getInfo() {\n`;
                jsCode += `      return {\n`;
                jsCode += `        id: '${extId}',\n`;
                jsCode += `        name: '${extName}',\n`;
                jsCode += `        blocks: [\n`;

                // Блоки
                for (let b of blocks) {
                    const blockType = b.hasReturn ? 'Scratch.BlockType.REPORTER' : 'Scratch.BlockType.COMMAND';
                    jsCode += `          {\n`;
                    jsCode += `            opcode: '${b.opcode}',\n`;
                    jsCode += `            blockType: ${blockType},\n`;
                    jsCode += `            text: '${b.text}',\n`;
                    jsCode += `            arguments: {\n`;
                    const argNames = Object.keys(b.argsDesc);
                    for (let k = 0; k < argNames.length; k++) {
                        const name = argNames[k];
                        const type = b.argsDesc[name];
                        let argType = 'Scratch.ArgumentType.' + type.toUpperCase();
                        if (type === 'dropdown') argType = 'Scratch.ArgumentType.STRING';
                        jsCode += `              ${name}: { type: ${argType}, defaultValue: ${type === 'number' ? '0' : type === 'string' ? '""' : 'false'} }`;
                        if (k < argNames.length - 1) jsCode += ',';
                        jsCode += '\n';
                    }
                    jsCode += `            }\n`;
                    jsCode += `          }`;
                    if (blocks.indexOf(b) < blocks.length - 1) jsCode += ',';
                    jsCode += '\n';
                }

                jsCode += `        ]\n`;
                jsCode += `      };\n`;
                jsCode += `    }\n\n`;

                // Методы для блоков
                for (let b of blocks) {
                    const opcode = b.opcode;
                    let methodBody = b.body;
                    // Если это репортёр, мы должны вернуть результат
                    if (b.hasReturn) {
                        // Тело уже содержит return, оставляем как есть
                        methodBody = `    ${opcode}(args) {\n      ${methodBody}\n    }`;
                    } else {
                        methodBody = `    ${opcode}(args) {\n      ${methodBody}\n    }`;
                    }
                    jsCode += methodBody + '\n\n';
                }

                jsCode += `  }\n\n`;
                jsCode += `  Scratch.extensions.register(new ${className}());\n`;
                jsCode += `})(Scratch);\n`;

                return jsCode;
            }

            // Вспомогательная функция обновления статуса
            function setStatus(msg, isError = false) {
                statusDiv.textContent = msg;
                statusDiv.className = 'status' + (isError ? ' error' : '');
            }

            // Конвертация
            function convert() {
                const luau = luauInput.value;
                try {
                    const js = translateLuauToJS(luau);
                    jsOutput.textContent = js;
                    setStatus('✅ Конвертация успешна!');
                    return js;
                } catch (e) {
                    jsOutput.textContent = '// Ошибка парсинга:\n' + e.message;
                    setStatus('❌ Ошибка: ' + e.message, true);
                    return null;
                }
            }

            // События
            convertBtn.addEventListener('click', convert);

            downloadBtn.addEventListener('click', function() {
                const js = jsOutput.textContent;
                if (!js || js.startsWith('// Ошибка')) {
                    setStatus('❌ Сначала сконвертируйте код без ошибок', true);
                    return;
                }
                const blob = new Blob([js], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'extension.js';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                setStatus('⬇ Файл extension.js скачан');
            });

            copyBtn.addEventListener('click', function() {
                const js = jsOutput.textContent;
                if (!js || js.startsWith('// Ошибка')) {
                    setStatus('❌ Нет кода для копирования', true);
                    return;
                }
                navigator.clipboard.writeText(js).then(() => {
                    setStatus('📄 Код скопирован в буфер');
                }).catch(() => {
                    const range = document.createRange();
                    range.selectNode(jsOutput);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    setStatus('📄 Код скопирован (fallback)');
                });
            });

            exampleBtn.addEventListener('click', function() {
                luauInput.value = exampleLuau;
                convert();
            });

            window.addEventListener('DOMContentLoaded', convert);

            luauInput.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    convert();
                }
            });
        })();
    </script>
</body>
</html>
