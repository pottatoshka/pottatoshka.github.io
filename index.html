<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создатель расширений для Turbowarp</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        header h1 {
            font-weight: 300;
            color: #ffb347;
        }
        header .info {
            font-size: 0.9rem;
            color: #aaa;
        }
        .main {
            display: flex;
            flex: 1;
            gap: 20px;
            min-height: 0;
        }
        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #2d2d44;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            overflow: hidden;
        }
        .panel h2 {
            font-weight: 300;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: #ffb347;
        }
        .editor-container {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        textarea, .code-output {
            flex: 1;
            width: 100%;
            background: #1a1a2e;
            color: #e0e0e0;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            outline: none;
            tab-size: 2;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .code-output {
            background: #12121f;
            overflow: auto;
            color: #b0d0f0;
        }
        .toolbar {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        button {
            background: #ffb347;
            color: #1e1e2f;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        button:hover {
            background: #ffa020;
            transform: scale(1.02);
        }
        button.secondary {
            background: #4a4a6a;
            color: #eee;
        }
        button.secondary:hover {
            background: #5a5a7a;
        }
        .example-btn {
            background: #2d5f7a;
            color: #eee;
        }
        .example-btn:hover {
            background: #3a7a9a;
        }
        .status {
            margin-top: 10px;
            padding: 8px 12px;
            border-radius: 6px;
            background: #1a1a2e;
            font-size: 0.9rem;
            color: #8f8;
        }
        .status.error {
            color: #f77;
            background: #3a1a1a;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        @media (max-width: 800px) {
            .main {
                flex-direction: column;
            }
            .panel {
                flex: none;
                height: 50vh;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>⚡ Turbowarp Extension Builder</h1>
        <span class="info">Пиши на простом DSL → получай JS для Turbowarp</span>
    </header>
    <div class="main">
        <!-- Левая панель: редактор -->
        <div class="panel">
            <h2>📝 Код на DSL</h2>
            <div class="editor-container">
                <textarea id="dslInput" spellcheck="false" placeholder="Введите код расширения...">extension id "example" name "Пример"
                
block "Сложить [a] и [b]"
  arg number "a"
  arg number "b"
  return args.a + args.b
end

block "Приветствие [name]"
  arg string "name"
  do console.log("Привет, " + args.name)
end</textarea>
            </div>
            <div class="toolbar">
                <button id="convertBtn">🔄 Конвертировать в JS</button>
                <button id="downloadBtn" class="secondary">⬇ Скачать .js</button>
                <button id="exampleBtn" class="example-btn">📋 Загрузить пример</button>
            </div>
            <div id="status" class="status">Готов к работе</div>
        </div>

        <!-- Правая панель: вывод -->
        <div class="panel">
            <h2>📦 Сгенерированный JavaScript</h2>
            <div class="editor-container">
                <pre id="jsOutput" class="code-output">// Здесь появится код расширения</pre>
            </div>
            <div class="toolbar">
                <button id="copyBtn" class="secondary">📄 Копировать</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM references
            const dslInput = document.getElementById('dslInput');
            const jsOutput = document.getElementById('jsOutput');
            const statusDiv = document.getElementById('status');
            const convertBtn = document.getElementById('convertBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const copyBtn = document.getElementById('copyBtn');
            const exampleBtn = document.getElementById('exampleBtn');

            // Пример кода для кнопки
            const exampleCode = `extension id "math" name "Математика"

block "Сложить [a] и [b]"
  arg number "a"
  arg number "b"
  return args.a + args.b
end

block "Случайное число от [min] до [max]"
  arg number "min"
  arg number "max"
  return Math.floor(Math.random() * (args.max - args.min + 1)) + args.min
end

block "Сказать [text]"
  arg string "text"
  do console.log("Сообщение: " + args.text)
end`;

            // Парсер и генератор
            function convertDSLtoJS(dsl) {
                // Удаляем лишние пробелы, но сохраняем переводы строк
                const lines = dsl.split('\n').map(line => line.trim());
                // Объединение в одну строку для удобства разбора, но сохраняем структуру
                // Простой парсер: ищем блоки extension и block ... end
                let result = '';
                let extensionId = 'myextension';
                let extensionName = 'My Extension';
                let blocks = [];
                let currentBlock = null;
                let insideBlock = false;

                // Функция для парсинга аргументов
                function parseArg(line) {
                    // arg type "name"
                    const match = line.match(/^arg\s+(number|string|boolean|dropdown)\s+"([^"]+)"$/);
                    if (!match) throw new Error('Неверный формат аргумента: ' + line);
                    return { type: match[1], name: match[2] };
                }

                // Функция для определения типа блока (репортёр или команда)
                function determineBlockType(bodyLines) {
                    for (let l of bodyLines) {
                        if (l.startsWith('return ')) return 'reporter';
                        if (l.startsWith('do ')) return 'command';
                    }
                    return 'command'; // по умолчанию команда
                }

                // Функция для получения тела (без return/do)
                function extractBody(lines) {
                    let body = [];
                    for (let l of lines) {
                        if (l.startsWith('return ')) {
                            // убираем 'return '
                            body.push(l.substring(7));
                        } else if (l.startsWith('do ')) {
                            body.push(l.substring(3));
                        } else {
                            body.push(l);
                        }
                    }
                    return body.join('\n');
                }

                // Проход по строкам
                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    if (!line || line.startsWith('//')) continue; // пропускаем пустые и комментарии

                    if (line.startsWith('extension id ')) {
                        const match = line.match(/^extension id\s+"([^"]+)"\s+name\s+"([^"]+)"$/);
                        if (match) {
                            extensionId = match[1];
                            extensionName = match[2];
                        } else {
                            // попробуем отдельно
                            const idMatch = line.match(/extension id\s+"([^"]+)"/);
                            if (idMatch) extensionId = idMatch[1];
                            // name может быть на следующей строке? упростим: ожидаем в одной строке
                            // для простоты считаем, что всё в одной строке
                        }
                        continue;
                    }

                    if (line.startsWith('block ')) {
                        // начало блока: block "text"
                        const match = line.match(/^block\s+"([^"]+)"$/);
                        if (!match) throw new Error('Неверный формат блока: ' + line);
                        const text = match[1];
                        currentBlock = {
                            text: text,
                            args: [],
                            bodyLines: [],
                            opcode: 'block' + (blocks.length + 1) // генерируем уникальный opcode
                        };
                        insideBlock = true;
                        continue;
                    }

                    if (insideBlock && line === 'end') {
                        // завершаем блок
                        if (currentBlock) {
                            // Определяем тип блока
                            const type = determineBlockType(currentBlock.bodyLines);
                            // Генерируем описание блока для getInfo
                            const blockInfo = {
                                opcode: currentBlock.opcode,
                                blockType: type === 'reporter' ? 'Scratch.BlockType.REPORTER' : 'Scratch.BlockType.COMMAND',
                                text: currentBlock.text,
                                arguments: {}
                            };
                            // Заполняем аргументы
                            let argIndex = 0;
                            for (let arg of currentBlock.args) {
                                const argName = arg.name;
                                // Ищем в тексте места для вставки: [argName]
                                // Но мы просто добавим все аргументы в arguments
                                let argType = 'Scratch.ArgumentType.' + arg.type.toUpperCase();
                                if (arg.type === 'dropdown') argType = 'Scratch.ArgumentType.STRING'; // упрощённо
                                blockInfo.arguments[argName] = {
                                    type: argType,
                                    defaultValue: arg.type === 'number' ? 0 : (arg.type === 'string' ? '' : '')
                                };
                                // Для dropdown нужен массив menu, но упростим
                                if (arg.type === 'dropdown') {
                                    blockInfo.arguments[argName].menu = 'menu_' + argName;
                                }
                            }
                            // Тело функции
                            const bodyCode = extractBody(currentBlock.bodyLines);
                            // Сохраняем блок
                            blocks.push({
                                info: blockInfo,
                                args: currentBlock.args,
                                body: bodyCode,
                                type: type
                            });
                            currentBlock = null;
                            insideBlock = false;
                        }
                        continue;
                    }

                    if (insideBlock && currentBlock) {
                        // Обрабатываем строки внутри блока
                        if (line.startsWith('arg ')) {
                            const arg = parseArg(line);
                            currentBlock.args.push(arg);
                        } else {
                            // Это тело (может быть return или do или обычный код)
                            currentBlock.bodyLines.push(line);
                        }
                    }
                }

                // Если остался незакрытый блок - ошибка
                if (insideBlock) {
                    throw new Error('Незакрытый блок (ожидается "end")');
                }

                // Теперь генерируем JavaScript-код расширения
                let jsCode = `(function(Scratch) {\n  'use strict';\n\n`;
                jsCode += `  class ${extensionId.charAt(0).toUpperCase() + extensionId.slice(1)}Extension {\n`;
                jsCode += `    getInfo() {\n`;
                jsCode += `      return {\n`;
                jsCode += `        id: '${extensionId}',\n`;
                jsCode += `        name: '${extensionName}',\n`;
                jsCode += `        blocks: [\n`;

                // Генерируем блоки
                for (let i = 0; i < blocks.length; i++) {
                    const b = blocks[i];
                    const info = b.info;
                    jsCode += `          {\n`;
                    jsCode += `            opcode: '${info.opcode}',\n`;
                    jsCode += `            blockType: ${info.blockType},\n`;
                    jsCode += `            text: '${info.text}',\n`;
                    jsCode += `            arguments: {\n`;
                    const argNames = Object.keys(info.arguments);
                    for (let j = 0; j < argNames.length; j++) {
                        const name = argNames[j];
                        const argDef = info.arguments[name];
                        jsCode += `              ${name}: { type: ${argDef.type}, defaultValue: ${JSON.stringify(argDef.defaultValue)} }`;
                        if (j < argNames.length - 1) jsCode += ',';
                        jsCode += '\n';
                    }
                    jsCode += `            }\n`;
                    jsCode += `          }`;
                    if (i < blocks.length - 1) jsCode += ',';
                    jsCode += '\n';
                }

                jsCode += `        ]\n`;
                jsCode += `      };\n`;
                jsCode += `    }\n\n`;

                // Генерируем методы для блоков
                for (let b of blocks) {
                    const opcode = b.info.opcode;
                    const argsList = b.args.map(a => a.name);
                    // Тело функции - используем строку тела, подставляя args.имя
                    // Заменяем args.имя на args['имя'] для безопасности
                    let bodyStr = b.body;
                    // Заменяем args.имя на args['имя'] (простейший способ)
                    // Ищем args.xxx
                    bodyStr = bodyStr.replace(/args\.([a-zA-Z_]\w*)/g, "args['$1']");
                    // Если это репортёр, нужно return, если нет - просто выполняем код
                    let methodBody = '';
                    if (b.type === 'reporter') {
                        // Если тело уже содержит return (мы его убрали), то просто вставляем
                        // У нас тело уже без return, так что добавляем return
                        methodBody = `    ${opcode}(args) {\n      return (function() { ${bodyStr} })();\n    }`;
                    } else {
                        // команда - выполняем код
                        methodBody = `    ${opcode}(args) {\n      ${bodyStr}\n    }`;
                    }
                    jsCode += methodBody + '\n\n';
                }

                jsCode += `  }\n\n`;
                jsCode += `  Scratch.extensions.register(new ${extensionId.charAt(0).toUpperCase() + extensionId.slice(1)}Extension());\n`;
                jsCode += `})(Scratch);\n`;

                return jsCode;
            }

            // Обновление статуса
            function setStatus(msg, isError = false) {
                statusDiv.textContent = msg;
                statusDiv.className = 'status' + (isError ? ' error' : '');
            }

            // Основная функция конвертации
            function convert() {
                const dsl = dslInput.value;
                try {
                    const js = convertDSLtoJS(dsl);
                    jsOutput.textContent = js;
                    setStatus('✅ Конвертация успешна!');
                    return js;
                } catch (e) {
                    jsOutput.textContent = '// Ошибка парсинга:\n' + e.message;
                    setStatus('❌ Ошибка: ' + e.message, true);
                    return null;
                }
            }

            // События
            convertBtn.addEventListener('click', convert);

            // Скачивание
            downloadBtn.addEventListener('click', function() {
                const js = jsOutput.textContent;
                if (!js || js.startsWith('// Ошибка')) {
                    setStatus('❌ Сначала сконвертируйте код без ошибок', true);
                    return;
                }
                const blob = new Blob([js], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'extension.js';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                setStatus('⬇ Файл extension.js скачан');
            });

            // Копирование
            copyBtn.addEventListener('click', function() {
                const js = jsOutput.textContent;
                if (!js || js.startsWith('// Ошибка')) {
                    setStatus('❌ Нет кода для копирования', true);
                    return;
                }
                navigator.clipboard.writeText(js).then(() => {
                    setStatus('📄 Код скопирован в буфер');
                }).catch(() => {
                    // fallback
                    const range = document.createRange();
                    range.selectNode(jsOutput);
                    window.getSelection().removeAllRanges();
                    window.getSelection().addRange(range);
                    document.execCommand('copy');
                    setStatus('📄 Код скопирован (fallback)');
                });
            });

            // Загрузить пример
            exampleBtn.addEventListener('click', function() {
                dslInput.value = exampleCode;
                convert(); // автоматически конвертировать
            });

            // Автоконвертация при загрузке
            window.addEventListener('DOMContentLoaded', function() {
                convert();
            });

            // Также можно добавить автообновление по Ctrl+Enter
            dslInput.addEventListener('keydown', function(e) {
                if (e.ctrlKey && e.key === 'Enter') {
                    e.preventDefault();
                    convert();
                }
            });

            // Запасной вариант: если не сработал clipboard
        })();
    </script>
</body>
</html>
